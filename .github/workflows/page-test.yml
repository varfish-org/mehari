name: GitHub Pages Test Build

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: locosopa
        uses: koesterlab/locosopa@92c786b2bb21f57e14d5c3ba1db8e7d5234bf39e # v1.2.0
        with:
          config: page/config.yaml
          path: build
          deploy: "false"
