# Run `release-please` and build and release Docker image.
#
# This builds the containers with version tags.  The `main` and `latest` tags are
# pushed in `docker-build.yml`.
name: Release

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  PACKAGE_NAME: ${{ github.repository }}
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-please:
    if: github.repository_owner == 'varfish-org'
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      release_name: ${{ steps.release.outputs['mehari--version'] || steps.release.outputs['mehari-python--version'] }}
    steps:
      - uses: GoogleCloudPlatform/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.BOT_TOKEN }}

  cargo-release:
    needs: release-please
    runs-on: ubuntu-24.04
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ needs.release-please.outputs.release_created == 'true' }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y librocksdb-dev libsnappy-dev libsqlite3-dev

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        if: ${{ needs.release-please.outputs.release_created }}
        with:
          toolchain: stable

      - name: Setup protoc
        uses: arduino/setup-protoc@v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ needs.release-please.outputs.release_created }}
        with:
          cache-directories: |
            ~/.cargo/registry/src/**/librocksdb-sys-*

      - name: Publish crate
        if: ${{ needs.release-please.outputs.release_created }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish

  container-release:
    needs: release-please
    runs-on: ubuntu-24.04
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.release_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.release_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.release_name }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: utils/docker/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  pypi-release:
    needs: release-please
    runs-on: ubuntu-24.04
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Force Static RocksDB Compilation
        run: rm -f .cargo/config.toml

      - name: Build and publish Python wheels
        uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --manifest-path mehari-python/Cargo.toml --out dist -i python3.11 python3.12 python3.13
          manylinux: 2_28
          before-script-linux: |
            if command -v dnf > /dev/null; then
              dnf install -y clang sqlite-devel zlib-devel wget unzip
            else
              yum install -y clang sqlite-devel zlib-devel wget unzip
            fi
            PREFIX=/usr/local bash utils/install-protoc.sh
